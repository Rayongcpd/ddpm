<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="รายละเอียดผู้บาดเจ็บและเสียชีวิตจากอุบัติเหตุทางถนน จังหวัดสุโขทัย">
  <title>📋 รายละเอียดบาดเจ็บ/เสียชีวิต - สถิติอุบัติเหตุทางถนน</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <span class="emoji">🚦</span>
        <span>สถิติอุบัติเหตุทางถนน จ.สุโขทัย</span>
      </a>
      <ul class="navbar-nav">
        <li><a href="index.html" id="nav-dashboard">📊 Dashboard</a></li>
        <li><a href="detail.html" class="active" id="nav-detail">📋 รายละเอียด</a></li>
        <li><a href="compare.html" id="nav-compare">📈 เปรียบเทียบ</a></li>
        <li><a href="admin.html" id="nav-admin">🔑 Admin</a></li>
      </ul>
    </div>
  </nav>

  <div class="container page-wrapper">

    <!-- Page Header -->
    <div class="page-header">
      <h1>📋 รายละเอียดผู้บาดเจ็บและเสียชีวิต</h1>
      <p class="subtitle">ข้อมูลรายกรณี พร้อมสถิติวิเคราะห์</p>
    </div>

    <!-- Controls & Filters -->
    <div class="filter-bar mb-xl">
      <div class="form-group">
        <label class="form-label">เทศกาล</label>
        <select class="form-control" id="detailFestival">
          <option value="songkran">🎉 สงกรานต์</option>
          <option value="newyear">🎄 ปีใหม่</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ปี พ.ศ.</label>
        <select class="form-control" id="detailYear"></select>
      </div>
      <div class="form-group">
        <label class="form-label">สถานะ</label>
        <select class="form-control" id="filterStatus">
          <option value="">ทั้งหมด</option>
          <option value="บาดเจ็บ">🏥 บาดเจ็บ</option>
          <option value="เสียชีวิต">✝️ เสียชีวิต</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">อำเภอ</label>
        <select class="form-control" id="filterDistrict">
          <option value="">ทุกอำเภอ</option>
        </select>
      </div>
    </div>

    <!-- Detail Content -->
    <div id="detailContent">
      <div class="loading"><div class="spinner"></div></div>
    </div>

  </div>

  <!-- Print Button -->
  <button class="btn-print" onclick="window.print()" title="พิมพ์รายงาน">🖨️</button>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/detail.js"></script>

</body>
</html>
